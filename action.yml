name: Commit Check Action
description: Check commit message formatting, branch naming, committer name, email, and more
author: shenxianpeng
branding:
  icon: "git-commit"
  color: "blue"
inputs:
  message:
    description: check git commit message following conventional commits
    required: false
    default: true
  branch:
    description: check git branch name following conventional branch
    required: false
    default: true
  author-name:
    description: check committer author name
    required: false
    default: false
  author-email:
    description: check committer author email
    required: false
    default: false
  dry-run:
    description: run checks without failing
    required: false
    default: false
  job-summary:
    description: display job summary to the workflow run
    required: false
    default: true
  pr-comments:
    description: post results to the pull request comments
    required: false
    default: false
  pr-title:
    description: check pull request title following conventional commits
    required: false
    default: false
runs:
  using: "composite"
  steps:
    - name: Install dependencies and run commit-check (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if [[ "$RUNNER_OS" == "Linux" ]]; then
          # https://github.com/pypa/setuptools/issues/3269
          export DEB_PYTHON_INSTALL_LAYOUT=deb
        fi

        # Set up virtual environment
        python3 -m venv venv
        source venv/bin/activate

        # Download artifact
        python3 -m pip download -r "$GITHUB_ACTION_PATH/requirements.txt"

        # Verify artifact attestations
        if ! gh attestation verify commit_check-*.whl -R commit-check/commit-check; then
            echo "Artifact verification failed. Aborting installation."
            exit 1
        fi

        # Install artifact
        python3 -m pip install commit_check-*.whl pygithub-*.whl

        python3 "$GITHUB_ACTION_PATH/main.py"
      env:
        MESSAGE: ${{ inputs.message }}
        BRANCH: ${{ inputs.branch }}
        AUTHOR_NAME: ${{ inputs.author-name }}
        AUTHOR_EMAIL: ${{ inputs.author-email }}
        DRY_RUN: ${{ inputs.dry-run }}
        JOB_SUMMARY: ${{ inputs.job-summary }}
        PR_COMMENTS: ${{ inputs.pr-comments }}
        PR_TITLE: ${{ inputs.pr-title }}
        GITHUB_TOKEN: ${{ github.token }}

    - name: Install dependencies and run commit-check (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        $env:DEB_PYTHON_INSTALL_LAYOUT = "deb"  # дҝқз•ҷдҪҶж— е®һйҷ…дҪңз”ЁпјҲWindows з”ЁдёҚеҲ°пјү

        # еҲӣе»әиҷҡжӢҹзҺҜеўғ
        python -m venv venv
        . .\venv\Scripts\Activate.ps1

        # еҚҮзә§ pipпјҲеҠ  --trusted-host йҳІ SSL й—®йўҳпјү
        python -m pip install --upgrade pip --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org
        python -m pip download -r "$env:GITHUB_ACTION_PATH\requirements.txt" --trusted-host pypi.org
        
        # вң… дҝ®еӨҚпјҡж·»еҠ и°ғиҜ•дҝЎжҒҜпјҢжҳҫзӨәжүҖжңүж–Үд»¶
        Write-Host "Files in current directory:"
        Get-ChildItem -Path . | Format-List Name

        # дҪҝз”Ё -Filter жӣҙеҸҜйқ ең°еҢ№й…Қ
        $commitCheckWhl = Get-ChildItem -Filter "commit_check-*.whl" -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $commitCheckWhl) {
            Write-Host "Error: No commit_check wheel found. Available files:"
            Get-ChildItem -Filter "*.whl" | Format-List Name
            exit 1
        }

        Write-Host "Found wheel: $($commitCheckWhl.Name)"
    
        # йӘҢиҜҒж–Үд»¶
        # gh attestation verify $commitCheckWhl.FullName -R commit-check/commit-check
        # if ($LASTEXITCODE -ne 0) {
        #     Write-Host "Artifact verification failed!"
        #     exit 1
        # }

        # е®үиЈ…commit_checkе’Ңpygithub
        $pygithubWhl = Get-ChildItem -Path "pygithub*.whl" | Select-Object -First 1
        if (-not $pygithubWhl) {
            Write-Host "Error: No pygithub wheel found."
            exit 1
        }
        Write-Host "Found pygithub wheel: $($pygithubWhl.Name)"

        python -m pip install $commitCheckWhl.FullName $pygithubWhl.FullName
        if ($LASTEXITCODE -ne 0) {
            Write-Host "Pip installation failed!"
            exit 1
        }

        # иҝҗиЎҢдё»и„ҡжң¬
        python "$env:GITHUB_ACTION_PATH\main.py"

      env:
        MESSAGE: ${{ inputs.message }}
        BRANCH: ${{ inputs.branch }}
        AUTHOR_NAME: ${{ inputs.author-name }}
        AUTHOR_EMAIL: ${{ inputs.author-email }}
        DRY_RUN: ${{ inputs.dry-run }}
        JOB_SUMMARY: ${{ inputs.job-summary }}
        PR_COMMENTS: ${{ inputs.pr-comments }}
        PR_TITLE: ${{ inputs.pr-title }}
        GITHUB_TOKEN: ${{ github.token }}
